<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator</title>

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <nav>
        <div>
          <h1>Password Generator</h1>
        </div>
      </nav>

      <div class="password-card">
        <div class="checkbox-group">
          <table>
                <label for="setAll">
                  <input type="checkbox" id="setAll" />
                  Set All
                </label>
            <tr>
              <td>
                <label for="caps">
                  <input type="checkbox" name="capitalize" id="caps" />
                  Upper-case (A-Z)
                </label>
              </td>
              <td>
                <label for="small">
                  <input type="checkbox" name="capitalize" id="small" />
                  Lower-case (a-z)
                </label>
              </td>
            </tr>
            <tr>
              <td>
                <label for="charst">
                  <input type="checkbox" name="character" id="charst" />
                  Characters (!, *, &)
                </label>
              </td>
              <td>
                <label for="num">
                  <input type="checkbox" name="number" id="num" />
                  Number (0-9)
                </label>
              </td>
            </tr>
          </table>
        </div>

        <div class="field">
          <label>Set Password Length</label>
          <div class="generated-password">
            <span class="count" id="count">8</span>
            <div>
              <button id="decr">-</button>
              <button id="incr">+</button>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Generated Password</label>
          <div class="generated-password">
            <input type="text" placeholder="ee4l3@H@" id="newPassword" />
            <button class="copy-btn" id="toCopy">📋</button>
          </div>
        </div>

        <button class="generate-btn" id="passGen">Generate</button>
      </div>

      <footer>
        <p>
          &copy; <span id="currentYear"></span> Password Generator. All rights
          reserved.
        </p>
      </footer>
    </div>
    <script src="bundle.js"></script>
  </body>
</html>
